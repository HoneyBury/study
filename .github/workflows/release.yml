name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-and-package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      BUILD_TYPE: Release
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan and Ninja
        run: |
          python -m pip install --upgrade pip
          pip install conan ninja

      - name: Conan profile
        run: conan profile detect --force

      - name: Install Conan dependencies
        run: conan install . --build=missing -s build_type="${BUILD_TYPE}" -c tools.cmake.cmaketoolchain:generator=Ninja

      - name: Configure CMake
        run: cmake --preset conan-release -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build --preset conan-release --parallel

      - name: Package
        run: cmake --build --preset conan-release --target package

      - name: Stage package artifact
        run: |
          mkdir -p staging
          find build -type f \
            \( -name "*.deb" -o -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.tar.gz" -o -name "*.zip" \) \
            ! -path "*/_CPack_Packages/*" \
            -exec cp {} staging/ \;
          ls -la staging
          test -n "$(ls -A staging)"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.os }}
          path: staging/
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-and-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: package-*
          merge-multiple: true

      - name: Verify packaged files
        run: ls -R dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: dist/*
