name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality:
    name: Quality (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      BUILD_TYPE: Debug
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install conan ninja
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy cppcheck

      - name: Conan profile
        run: conan profile detect --force

      - name: Install Conan dependencies
        run: conan install . --build=missing -s build_type="${BUILD_TYPE}"

      - name: Configure CMake
        run: cmake --preset conan-debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DBUILD_TESTING=ON

      - name: Encoding and newline check
        run: python3 scripts/normalize_text.py --check

      - name: clang-format check
        run: bash scripts/run_clang_format.sh --check

      - name: Build
        run: cmake --build --preset conan-debug --parallel

      - name: Unit tests
        run: ctest --preset conan-debug --output-on-failure

      - name: cppcheck
        run: |
          cppcheck \
            --std=c++17 \
            --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --inline-suppr \
            src tests

      - name: clang-tidy
        shell: bash
        run: |
          mapfile -t cpp_files < <(git ls-files '*.cpp' | grep -E '^(src|tests)/')
          if [ "${#cpp_files[@]}" -eq 0 ]; then
            echo "No C++ source files found."
            exit 0
          fi
          clang-tidy "${cpp_files[@]}" -p build/Debug

  build-test-package:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_type: Debug
            build_preset: conan-debug
          - os: ubuntu-latest
            build_type: Release
            build_preset: conan-release
          - os: windows-latest
            build_type: Debug
            build_preset: conan-debug
          - os: windows-latest
            build_type: Release
            build_preset: conan-release
          - os: macos-latest
            build_type: Debug
            build_preset: conan-debug
          - os: macos-latest
            build_type: Release
            build_preset: conan-release
    env:
      BUILD_TYPE: ${{ matrix.build_type }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install NSIS
        if: runner.os == 'Windows' && matrix.build_type == 'Release'
        run: choco install nsis -y

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan and Ninja
        run: |
          python -m pip install --upgrade pip
          pip install conan ninja

      - name: Conan profile
        run: conan profile detect --force

      - name: Install Conan dependencies
        run: conan install . --build=missing -s build_type="${BUILD_TYPE}" -c tools.cmake.cmaketoolchain:generator=Ninja

      - name: Configure CMake
        run: cmake --preset "${{ matrix.build_preset }}" -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build --preset "${{ matrix.build_preset }}" --parallel

      - name: Test (Debug only)
        if: matrix.build_type == 'Debug'
        run: ctest --preset conan-debug --output-on-failure

      - name: Package (Release only)
        if: matrix.build_type == 'Release'
        run: cmake --build --preset "${{ matrix.build_preset }}" --target package

      - name: Stage packages
        if: matrix.build_type == 'Release'
        run: |
          mkdir -p staging
          find build -type f \
            \( -name "*.deb" -o -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.tar.gz" -o -name "*.zip" \) \
            ! -path "*/_CPack_Packages/*" \
            -exec cp {} staging/ \;
          ls -la staging
          test -n "$(ls -A staging)"

      - name: Upload packages
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.os }}
          path: staging/
          if-no-files-found: error
